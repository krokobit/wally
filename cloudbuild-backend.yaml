steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/krokobit-wally/wally-backend/wally-backend:$COMMIT_SHA', '-f', 'wally-registry-backend/Dockerfile', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/krokobit-wally/wally-backend/wally-backend:$COMMIT_SHA']
- name: "gcr.io/cloud-builders/gcloud"
  args: ["run","deploy","wally-backend","--image","us-central1-docker.pkg.dev/krokobit-wally/wally-backend/wally-backend:$COMMIT_SHA","--region","us-central1","--platform","managed","--command","./launch","--port","8000","--allow-unauthenticated"]
timeout: 900s
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
